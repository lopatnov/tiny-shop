name: CodeQL

# Явный CodeQL-воркфлоу с config-file — гарантирует применение .github/codeql/codeql-config.yml
# (excludes crates/*/tests/**). Наличие этого файла отключает GitHub-авто-динамический воркфлоу,
# устраняя рекуррентный false-positive storm на temp_db() в интеграционных тестах.

permissions:
    contents: read
    security-events: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, synchronize, reopened]
    schedule:
        - cron: "0 6 * * 1" # каждый понедельник 06:00 UTC

jobs:
    analyze:
        name: Analyze (Rust)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false
            - name: Initialize CodeQL
              uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
              with:
                  languages: rust
                  # Ключевая строка: явная ссылка на конфиг — исключает crates/*/tests/**
                  config-file: .github/codeql/codeql-config.yml
            - name: Autobuild
              uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
              with:
                  category: /language:rust
