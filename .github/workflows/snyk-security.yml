name: Snyk Security

# Snyk SCA (зависимости Cargo.lock) + SAST (статический анализ Rust-кода).
# Адаптирован под Rust-only: без Docker, Node.js и IaC-шагов.
# Требует секрет SNYK_TOKEN в настройках репозитория.

permissions:
    contents: read
    security-events: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, synchronize, reopened]
    schedule:
        - cron: "0 8 * * 1" # каждый понедельник 08:00 UTC

jobs:
    snyk-sca:
        name: Snyk SCA (Cargo dependencies)
        runs-on: ubuntu-latest
        env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false
            - name: Set up Snyk CLI
              uses: snyk/actions/setup@8e119fbb6c251787721d34ba683ed48eba792766 # master
            - name: Snyk test — SCA (Cargo.lock)
              # continue-on-error: true чтобы уязвимости не блокировали CI немедленно;
              # результаты видны в SARIF и Snyk UI.
              run: snyk test --sarif --sarif-file-output=snyk-sca.sarif
              continue-on-error: true
              if: ${{ env.SNYK_TOKEN != '' }}
            - name: Upload Snyk SCA SARIF
              uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
              with:
                  sarif_file: snyk-sca.sarif
                  wait-for-processing: true
              if: ${{ env.SNYK_TOKEN != '' && hashFiles('snyk-sca.sarif') != '' }}
            - name: Snyk monitor (main branch only)
              run: snyk monitor
              if: ${{ github.ref == 'refs/heads/main' && env.SNYK_TOKEN != '' }}

    snyk-sast:
        name: Snyk SAST (Rust code)
        runs-on: ubuntu-latest
        env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false
            - name: Set up Snyk CLI
              uses: snyk/actions/setup@8e119fbb6c251787721d34ba683ed48eba792766 # master
            - name: Snyk code test — SAST
              run: snyk code test --sarif --sarif-file-output=snyk-sast.sarif
              continue-on-error: true
              if: ${{ env.SNYK_TOKEN != '' }}
            - name: Upload Snyk SAST SARIF
              uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
              with:
                  sarif_file: snyk-sast.sarif
                  wait-for-processing: true
              if: ${{ env.SNYK_TOKEN != '' && hashFiles('snyk-sast.sarif') != '' }}
