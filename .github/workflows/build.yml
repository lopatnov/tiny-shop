name: Build

# Минимальные права по умолчанию (least privilege).
permissions:
    contents: read

# Отменять устаревшие прогоны при новом push в ту же ветку (экономия CI).
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, synchronize, reopened]
jobs:
    sonarqube:
        name: SonarQube
        runs-on: ubuntu-latest
        # SONAR_TOKEN на уровне job — чтобы проверить его наличие в `if` ниже.
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0 # full history для blame / new-code detection
                  persist-credentials: false
            - name: SonarQube Scan
              # Не блокировать CI, если секрет не настроен (например, в форках/контрибьюторских PR).
              if: ${{ env.SONAR_TOKEN != '' }}
              uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
              env:
                  SONAR_HOST_URL: https://sonarcloud.io
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    rust:
        name: Rust CI
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
              with:
                  components: clippy, rustfmt
            - name: Cache cargo
              uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
            - name: Format check
              run: cargo fmt --all --check
            - name: Clippy (warnings as errors)
              run: cargo clippy --workspace --all-targets -- -D warnings
            - name: Build
              run: cargo build --workspace
            - name: Test
              run: cargo test --workspace
