# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Rust-зависимости воркспейса (root Cargo.toml + члены).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
      include: "scope"
    # Группируем minor/patch в один PR, чтобы не спамить (см. rules/conventions.md).
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions в .github/workflows (заодно помогает пиннить/обновлять экшены).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
