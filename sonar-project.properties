# SonarCloud project configuration
# https://sonarcloud.io/project/overview?id=lopatnov_tiny-shop

sonar.projectKey=lopatnov_tiny-shop
sonar.organization=lopatnov

# Исходники — крейты воркспейса. Тесты и сборочный вывод исключаем из анализа.
sonar.sources=crates
sonar.exclusions=\
  target/**,\
  **/tests/**

# Покрытие (LCOV). Генерация coverage.lcov через cargo-llvm-cov — follow-up (DEVOPS-1);
# пока файла нет — Sonar просто не покажет покрытие (на статус не влияет).
sonar.rust.lcov.reportPaths=coverage.lcov
